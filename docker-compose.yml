services:
  app:
    image: ghcr.io/jonathanaspeling/piles:latest
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "true"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_DEBUG: ${APP_DEBUG:-false}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/app/database/database.sqlite}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_DOMAIN: ${SESSION_DOMAIN}
      CACHE_STORE: ${CACHE_STORE:-database}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: ${REVERB_HOST}
      REVERB_PORT: ${REVERB_PORT:-443}
      REVERB_SCHEME: ${REVERB_SCHEME:-https}
    volumes:
      - piles-db:/app/database
      - piles-storage:/app/storage
    expose:
      - "80"
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisord.conf"]

  queue:
    image: ghcr.io/jonathanaspeling/piles:latest
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "false"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_DEBUG: ${APP_DEBUG:-false}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/app/database/database.sqlite}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: ${REVERB_HOST}
      REVERB_PORT: ${REVERB_PORT:-443}
      REVERB_SCHEME: ${REVERB_SCHEME:-https}
    volumes:
      - piles-db:/app/database
      - piles-storage:/app/storage
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]

  reverb:
    image: ghcr.io/jonathanaspeling/piles:latest
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "false"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_DEBUG: ${APP_DEBUG:-false}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/app/database/database.sqlite}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: ${REVERB_HOST}
      REVERB_PORT: ${REVERB_PORT:-443}
      REVERB_SCHEME: ${REVERB_SCHEME:-https}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    volumes:
      - piles-db:/app/database
      - piles-storage:/app/storage
    expose:
      - "8080"
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]

volumes:
  piles-db:
  piles-storage:
